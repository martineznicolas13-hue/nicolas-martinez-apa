<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brochure Nicolas Martinez | Aperçu et téléchargement PDF</title>
    <meta
      name="description"
      content="Aperçu rapide et téléchargement direct de la brochure PDF une page de Nicolas Martinez, enseignant en activité physique adaptée à Saint-Maime."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://www.activite-physique-adaptee-nicolas-martinez.fr/brochure/" />
    <meta name="theme-color" content="#FAFAF5" />
    <meta property="og:title" content="Brochure Nicolas Martinez" />
    <meta
      property="og:description"
      content="Page d'aperçu minimal pour ouvrir ou télécharger la brochure PDF une page de Nicolas Martinez."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.activite-physique-adaptee-nicolas-martinez.fr/brochure/" />
    <meta property="og:image" content="https://www.activite-physique-adaptee-nicolas-martinez.fr/brochure/nicolas-martinez-brochure-preview.png" />
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bg: #fafaf5;
        --surface: rgba(255, 255, 255, 0.92);
        --line: rgba(107, 123, 60, 0.16);
        --sage: #6b7b3c;
        --sage-light: #8fa058;
        --text: #23231f;
        --text-muted: #5d5d50;
        --shadow: 0 24px 70px rgba(41, 44, 31, 0.08);
        --radius-lg: 30px;
        --radius-md: 20px;
        --radius-pill: 999px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(143, 160, 88, 0.15), transparent 30%),
          radial-gradient(circle at bottom right, rgba(198, 123, 92, 0.12), transparent 24%),
          var(--bg);
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1100px, calc(100% - 28px));
        margin: 0 auto;
        padding: 24px 0 28px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overflow: hidden;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        gap: 24px;
        align-items: start;
        padding: clamp(18px, 3vw, 28px);
      }

      .copy {
        display: grid;
        gap: 18px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
      }

      .brand img {
        display: block;
        width: auto;
        height: 44px;
        max-width: min(100%, 240px);
      }

      .eyebrow {
        margin: 0;
        color: var(--sage);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 4.2vw, 3.25rem);
        line-height: 1.08;
        letter-spacing: -0.03em;
      }

      .lead,
      .meta,
      .back-link {
        margin: 0;
        color: var(--text-muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 0 22px;
        border-radius: var(--radius-pill);
        text-decoration: none;
        border: 1px solid var(--line);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .button:hover,
      .button:focus-visible,
      .preview:hover,
      .preview:focus-visible {
        transform: translateY(-1px);
        box-shadow: 0 16px 34px rgba(41, 44, 31, 0.08);
      }

      .button.primary {
        color: #fff;
        border-color: transparent;
        background: linear-gradient(135deg, var(--sage), var(--sage-light));
      }

      .button.secondary {
        background: rgba(255, 255, 255, 0.86);
      }

      .meta {
        font-size: 0.95rem;
      }

      .back-link {
        display: inline-flex;
        width: fit-content;
        text-decoration: none;
        border-bottom: 1px solid rgba(107, 123, 60, 0.22);
      }

      .preview {
        display: block;
        text-decoration: none;
        border-radius: 24px;
        overflow: hidden;
        background: #fff;
        border: 1px solid rgba(107, 123, 60, 0.14);
      }

      .preview img {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (max-width: 860px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .shell {
          width: min(100% - 16px, 1100px);
          padding-top: 12px;
          padding-bottom: 16px;
        }

        .layout {
          gap: 18px;
          padding: 16px;
        }

        .brand img {
          height: 40px;
        }

        .actions {
          width: 100%;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-labelledby="brochure-title">
        <div class="layout">
          <div class="copy">
            <a class="brand" href="../">
              <img
                src="../images/logo-nicolas-martinez-apa.png"
                alt="Nicolas Martinez - Activité physique adaptée"
                width="732"
                height="180"
              />
            </a>

            <div>
              <p class="eyebrow">Brochure PDF · accès direct</p>
              <h1 id="brochure-title">Aperçu rapide de la brochure PDF.</h1>
            </div>

            <p class="lead">Cette page sert uniquement à ouvrir ou télécharger la brochure une page de Nicolas Martinez.</p>

            <div class="actions">
              <a class="button primary" href="nicolas-martinez-brochure.pdf" download>Télécharger le PDF</a>
              <a class="button secondary" href="nicolas-martinez-brochure.pdf" target="_blank" rel="noopener">Ouvrir le PDF</a>
            </div>

            <p class="meta">Format A4 · 1 page · cliquez aussi sur l'aperçu pour ouvrir le document.</p>
            <a class="back-link" href="../">Retour au site principal</a>
          </div>

          <a class="preview" href="nicolas-martinez-brochure.pdf" target="_blank" rel="noopener" aria-label="Ouvrir la brochure PDF Nicolas Martinez">
            <img
              src="nicolas-martinez-brochure-preview.png"
              alt="Aperçu de la brochure PDF Nicolas Martinez"
              width="1200"
              height="1697"
            />
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
